x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: oil-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-oiluser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-oilpass}
      POSTGRES_DB: ${DB_NAME:-oil_saas}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-oiluser} -d ${DB_NAME:-oil_saas}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  qdrant:
    image: qdrant/qdrant:latest
    container_name: oil-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: oil-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --save 300 10
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging: *default-logging

  minio:
    image: minio/minio:latest
    container_name: oil-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oil-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "Oil Expert SaaS MVP"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-oiluser}
      DB_PASSWORD: ${DB_PASSWORD:-oilpass}
      DB_NAME: ${DB_NAME:-oil_saas}
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: uploads
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-prod}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://192.168.31.192:1234/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      DEBUG: ${DEBUG:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./app:/app/app
    logging: *default-logging

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oil-celery-worker
    restart: unless-stopped
    environment:
      APP_NAME: "Oil Expert SaaS MVP"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-oiluser}
      DB_PASSWORD: ${DB_PASSWORD:-oilpass}
      DB_NAME: ${DB_NAME:-oil_saas}
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: uploads
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-prod}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://192.168.31.192:1234/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      DEBUG: ${DEBUG:-false}
    command: celery -A app.core.celery_app worker --loglevel=warning --concurrency=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./app:/app/app
    logging: *default-logging

  dev-tools:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oil-dev-tools
    profiles: ["dev"]
    command: >
      sh -c "
        pip install --no-cache-dir -r requirements-dev.txt &&
        echo '=== Ruff Check ===' &&
        ruff check app/ &&
        echo '=== Ruff Format ===' &&
        ruff format --check app/ &&
        echo '=== Mypy ===' &&
        mypy app/ --ignore-missing-imports &&
        echo '=== Все проверки пройдены ==='
      "
    volumes:
      - ./app:/app/app
    logging: *default-logging

  nginx:
    image: nginx:alpine
    container_name: oil-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    logging: *default-logging

volumes:
  pgdata:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
